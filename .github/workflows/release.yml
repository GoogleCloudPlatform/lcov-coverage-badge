name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  bundle-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Prepare Release Bundle
        run: |
          npm ci
          npm run prepare

      - name: Commit Dist to Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          if ! git diff --staged --quiet; then
            git commit -m "build: bundle distribution artifacts for release ${GITHUB_REF_NAME}"
            git tag -f "${GITHUB_REF_NAME}"
            git push origin "${GITHUB_REF_NAME}" --force
          fi
